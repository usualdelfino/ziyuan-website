<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Project image placeholder</title>
  <desc id="desc">A low saturation placeholder for future project photography.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eeeeee"/>
      <stop offset="0.48" stop-color="#d9d9d9"/>
      <stop offset="1" stop-color="#c8c8c8"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222222" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#222222" stop-opacity="0.18"/>
    </linearGradient>
    <pattern id="dot" width="18" height="18" patternUnits="userSpaceOnUse">
